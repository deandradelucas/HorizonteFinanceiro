<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Horizonte Financeiro</title>
    <link rel="stylesheet" href="dashboard-sidebar-exact.css?v=20260311-01">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Horizonte">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="dashboard-body dashboard-profile-static">
    <script>
        const siteTheme = localStorage.getItem('siteTheme');
        if (siteTheme && siteTheme !== 'default') document.body.dataset.theme = siteTheme;
        if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');
        if (localStorage.getItem('glassMode') === 'enabled') document.body.classList.add('glass-mode');
    </script>

    <div class="scenic-wall" aria-hidden="true"></div>
    <div class="dashboard-shell">
        <aside class="sidebar">
            <div class="sidebar-profile">
                <div class="profile-avatar" id="sidebarUserInitials">GM</div>
                <div class="profile-info">
                    <strong id="sidebarUserName">Gadiel Machado</strong>
                    <span id="sidebarUserRole">Designer</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item active" title="Dashboard" data-keep-label="true"><i class="fa-solid fa-table-cells-large"></i><span>Dashboard</span></a>
                <a href="/investments" class="nav-item" title="Wallet" data-keep-label="true"><i class="fa-solid fa-wallet"></i><span>Wallet</span></a>
                <a href="/transactions" class="nav-item" title="Transactions" data-keep-label="true"><i class="fa-solid fa-layer-group"></i><span>Transactions</span></a>
                <a href="/history" class="nav-item" title="Revenue analytics" data-keep-label="true"><i class="fa-regular fa-rectangle-list"></i><span>Revenue analytics</span></a>
                <a href="#" class="nav-item" title="Search" data-keep-label="true"><i class="fa-solid fa-magnifying-glass"></i><span>Search</span></a>
            </nav>

            <div class="sidebar-divider" aria-hidden="true"></div>

            <div class="sidebar-footer">
                <a href="/settings" class="nav-item" title="Settings" data-keep-label="true"><i class="fa-solid fa-gear"></i><span>Setting</span></a>
                <a href="/settings" class="nav-item" title="Help" data-keep-label="true"><i class="fa-regular fa-circle-question"></i><span>Help</span></a>
                <a href="/login" class="nav-item logout" title="Log out" data-keep-label="true"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Log Out</span></a>
            </div>
        </aside>

        <main class="main-content">
            <header class="mobile-topbar">
                <button id="mobileMenuBtn" class="mobile-menu-btn" type="button" aria-label="Abrir menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <span class="mobile-topbar-title">Dashboard</span>
                <div class="mobile-topbar-avatar" aria-hidden="true"></div>
            </header>

            <section class="dashboard-canvas" aria-label="Área principal do dashboard"></section>
        </main>
    </div>

    <script src="script.js?v=20260310-04"></script>
</body>

</html>
