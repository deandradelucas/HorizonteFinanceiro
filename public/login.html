<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta name="theme-color" content="#0f172a" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Horizonte Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="manifest" href="/manifest.json" />
</head>

<body>
    <script>
        if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');
    </script>
    <div class="container centered-auth">
        <div class="form-section">
            <div class="form-wrapper">
                <div class="auth-logo">
                    <i class="fa-solid fa-chart-pie"></i>
                    <h2>Horizonte Financeiro</h2>
                </div>
                <h2>Acesse sua conta</h2>
                <p class="subtitle">Insira suas credenciais para continuar</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="loginEmail">E-mail</label>
                        <div class="input-field">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="loginPassword">Senha</label>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="loginPassword" placeholder="Sua senha secreta" required>
                            <i class="fa-regular fa-eye toggle-password" id="toggleLoginPassword"></i>
                        </div>
                        <div style="text-align: right; margin-top: 8px;">
                            <a href="#"
                                style="color: var(--primary-color); font-size: 13px; text-decoration: none; font-weight: 500;">Esqueceu
                                a senha?</a>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <label class="checkbox-container">
                            <input type="checkbox" id="rememberMe">
                            <span class="checkmark"></span>
                            Lembrar de mim
                        </label>
                    </div>

                    <button type="submit" class="btn-primary">Entrar</button>

                </form>

                <p class="login-link">Novo por aqui? <a href="/">Crie uma conta</a></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
