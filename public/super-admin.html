<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Horizonte Financeiro</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        dark: '#1e293b'
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/vue@3.3.4/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue3-sfc-loader@0.8.4/dist/vue3-sfc-loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body.dashboard-body {
            min-height: 100vh;
            max-width: 100vw;
            overflow-x: hidden;
        }

        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .spinner {
            border: 4px solid rgba(148, 163, 184, 0.12);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border-left-color: #2563eb;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        [v-cloak] {
            display: none;
        }
    </style>
</head>
<body class="dashboard-body">
    <script>
        const siteTheme = localStorage.getItem('siteTheme');
        if (siteTheme && siteTheme !== 'default') document.body.dataset.theme = siteTheme;
        if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');
    </script>

    <div id="app" v-cloak>
        <div v-if="loadingApp" class="loader-container">
            <div class="spinner"></div>
        </div>
        <admin-users-dashboard v-else></admin-users-dashboard>
    </div>

    <script>
        const rawUserId = sessionStorage.getItem('userId');
        const role = localStorage.getItem('userRole');

        if (!rawUserId || role !== 'super_admin') {
            window.location.href = '/login';
        }

        const { loadModule } = window['vue3-sfc-loader'];

        const options = {
            moduleCache: { vue: Vue },
            async getFile(url) {
                const res = await fetch(url);
                if (!res.ok) throw Object.assign(new Error(res.statusText + ' ' + url), { res });
                return {
                    getContentData: asBinary => asBinary ? res.arrayBuffer() : res.text(),
                }
            },
            addStyle(textContent) {
                const style = Object.assign(document.createElement('style'), { textContent });
                const ref = document.head.getElementsByTagName('style')[0] || null;
                document.head.insertBefore(style, ref);
            },
        };
        window.vue3Options = options;

        const app = Vue.createApp({
            data() {
                return { loadingApp: true }
            },
            mounted() {
                setTimeout(() => {
                    this.loadingApp = false;
                }, 250);
            }
        });

        app.component('admin-users-dashboard', Vue.defineAsyncComponent(() =>
            loadModule('/admin/AdminUsersDashboard.vue', options)
        ));

        app.mount('#app');
    </script>
</body>
</html>
