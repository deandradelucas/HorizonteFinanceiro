<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novo Cadastro - Horizonte Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <script>
        if (localStorage.getItem('darkMode') === 'enabled') document.body.classList.add('dark-mode');
    </script>
    <div class="container centered-auth">
        <div class="form-section">
            <div class="form-wrapper">
                <div class="auth-logo">
                    <i class="fa-solid fa-chart-pie"></i>
                    <h2>Horizonte Financeiro</h2>
                </div>
                <h2>Comece agora</h2>
                <p class="subtitle">Crie sua conta gratuitamente</p>

                <form id="registerForm">
                    <div class="input-group">
                        <label for="fullName">Nome Completo</label>
                        <div class="input-field">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="fullName" placeholder="Digite seu nome completo" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail</label>
                        <div class="input-field">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="email" placeholder="seu@email.com" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Senha</label>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="Crie uma senha forte" required>
                            <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar" id="strengthBar"></div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirmar Senha</label>
                        <div class="input-field">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Repita a senha" required>
                        </div>
                    </div>


                    <button type="submit" class="btn-primary">Criar Conta</button>

                </form>

                <p class="login-link">Já tem uma conta? <a href="/login">Faça login</a></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
